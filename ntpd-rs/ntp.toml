[observability]
log-level = "info"
observation-path = "/var/run/ntpd-rs/observe"

[[source]]
mode = "server"
address = "ntp.ntsc.ac.cn"

[[source]]
mode = "server"
address = "ntp.cnnic.cn"

[[source]]
mode = "server"
address = "cn.ntp.org.cn"

[[source]]
mode = "server"
address = "cn.pool.ntp.org"

[[source]]
mode = "server"
address = "ntp.aliyun.com"

[[source]]
mode = "server"
address = "ntp.tencent.com"

[[server]]
listen = "0.0.0.0:123"

[synchronization]
# 3个以上ntp服务器时间相同才会同步时间
minimum-agreeing-sources = 3
# 运行过程中时间差距±1000秒以内才会同步时间
single-step-panic-threshold = { forward = 1000, backward = 1000 }
# 初次运行时时间慢了无限秒和快了86400秒才会同步时间
startup-step-panic-threshold = { forward="inf", backward = 86400 }
