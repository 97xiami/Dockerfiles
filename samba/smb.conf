[global]
   # === 基本服务器设置 ===
   # 工作组名称
   workgroup = WORKGROUP
   # 服务器描述字符串
   server string = Samba Server %h (%v)
   # 服务器角色：独立服务器
   server role = standalone server
   # 映射无效用户到访客
   map to guest = Bad User
   # 安全模式：用户级认证
   security = user
   # 后端数据库：tdbsam
   passdb backend = tdbsam
   # 最小SMB协议版本
   server min protocol = SMB3
   # 启用散射读写以提高网络效率
   socket options = TCP_NODELAY IPTOS_LOWSOUND
   # 日志级别：2
   log level = 2
   # 单个日志文件的最大大小（KB），达到后轮转
   max log size = 1000
   # 完全禁用打印服务
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes
   # 禁用Unix扩展
   unix extensions = no
   # === 文件系统选项 ===
   # 禁止松散文件名
   mangled names = no

[share]
   # 描述将显示在网络邻居中，帮助用户识别共享用途
   comment = Personal Share for user 'share'
   # 共享的实际文件系统路径
   path = /home/share/share
   # 访问控制 - 指定哪些用户可以访问此共享
   valid users = share
   # 浏览性 - 是否在网络邻居中可见
   browsable = yes
   # 写入权限 - 是否允许用户修改文件
   writable = yes
   read only = no
   # 访客访问 - 是否允许未认证用户访问
   guest ok = no

   # === 权限设置 ===
   # 没有执行位（--x）会导致无法进入目录或列目录内容
   # 正确的目录掩码应包括执行位，使得目录可访问
   #
   # 文件掩码：0644
   #   - 属主：读写 (rw-)
   #   - 属组：只读 (r--)
   #   - 其他人：只读 (r--)
   # 目录掩码：0755
   #   - 属主：读写执行 (rwx)
   #   - 属组：读执行 (r-x)
   #   - 其他人：读执行 (r-x)
   # 这种设置允许属主完全控制，而属组和其他人可以读取和进入目录
   #
   # 注意：force create mode和force directory mode确保这些掩码总是被应用
   # 即使客户端试图创建不同权限的文件/目录
   create mask = 0644
   force create mode = 0644
   directory mask = 0755
   force directory mode = 0755
