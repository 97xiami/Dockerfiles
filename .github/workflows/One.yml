name: One
run-name: "Docker Build: ${{ inputs.name }}"

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: "ssh connect"
        required: true
        type: boolean
        default: false
      name:
        description: "Dir Name"
        required: true
        type: choice
        options:
          - "aria2"
          - "ariang"
          - "frpc"
          - "frps"
          - "kms"
          - "mind-map"
          - "mindustry"
          - "ntpd-rs"
          - "openlist"
          - "qbittorrentee"
          - "samba"
      arch:
        description: " Target Arch"
        required: true
        type: choice
        default: "linux/amd64"
        options:
          - "linux/amd64"
          - "linux/arm64"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit # 多次运行后改为block+白名单
          # allowed-endpoints:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false # Github Token仅用于拉取代码，完成后从本地删除

      - name: Hadolint Check
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ github.event.inputs.name }}/Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.USER_NAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./${{ github.event.inputs.name }}
          file: ./${{ github.event.inputs.name }}/Dockerfile
          platforms: ${{ github.event.inputs.arch }}
          push: true
          tags: |
            ${{ secrets.USER_NAME }}/${{ github.event.inputs.name }}:test