name: One
run-name: "Docker Build: ${{ inputs.name }}"

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: "ssh connect"
        required: true
        type: boolean
        default: false
      name:
        description: "Dir Name"
        required: true
        type: choice
        options:
          - "aria2"
          - "ariang"
          - "frpc"
          - "frps"
          - "kms"
          - "mind-map"
          - "mindustry"
          - "ntpd-rs"
          - "openlist"
          - "qbittorrentee"
          - "samba"
      arch:
        description: " Target Arch"
        required: true
        type: choice
        default: "linux/amd64"
        options:
          - "linux/amd64"
          - "linux/arm64"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit # 多次运行后改为block+白名单
          # allowed-endpoints:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false # Github Token仅用于拉取代码，完成后从本地删除

      - name: Hadolint Check
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ github.event.inputs.name }}/Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.USER_NAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start SSH via tmate
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3.23
        if: ${{ github.event.inputs.ssh == 'true' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./${{ github.event.inputs.name }}
          file: ./${{ github.event.inputs.name }}/Dockerfile
          platforms: ${{ github.event.inputs.arch }}
          push: true
          tags: |
            ${{ secrets.USER_NAME }}/${{ github.event.inputs.name }}:test
            ghcr.io/${{ github.actor }}/${{ github.event.inputs.name }}:test

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.actor }}/${{ github.event.inputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Delete vaultwarden-buildcache containers
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          package-name: ${{ github.event.inputs.name }}
          package-type: "container"
          delete-only-untagged-versions: "true"
