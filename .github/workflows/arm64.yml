name: AMD64

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to DockerHub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.USER_NAME }}
        password: ${{ secrets.PASSWORD }}

    - name: Build and Push
      uses: docker/build-push-action@v2
      with:
        context: ./${{ github.event.inputs.project }}
        file: ./${{ github.event.inputs.project }}/Dockerfile
        platforms: linux/amd64
        push: true
        tags: xiami110/${{ github.event.inputs.project }}:latest

    - name: Delete Workflow History
      uses: 97xiami/delete-workflow-runs@master
      with:
        retain_days: 1
        keep_minimum_runs: 1
