name: nas-tools
run-name: "Docker Build: nas-tools"

on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest    
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 1
        persist-credentials: false # Github Token仅用于拉取代码，完成后从本地删除

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to DockerHub
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        username: ${{ secrets.USER_NAME }}
        password: ${{ secrets.PASSWORD }}

    - name: git clone nas-tools
      run: |
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        git clone --depth=1 https://github.com/97xiami/nas-tools /workdir

    - name: Build and Push
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: /workdir
        file: /workdir/docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: xiami110/nas-tools:2.9.1
