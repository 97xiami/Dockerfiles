# 工作流名称
name: 检查更新

# 定义触发条件
on:
  # 允许手动触发工作流
  workflow_dispatch:
  # 定时执行，每天 23:00 UTC 触发
  schedule:
    - cron: "0 23 * * *"

permissions: {}

jobs:
  check:
    name: ${{ matrix.repo_dir }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    # 定义策略
    strategy:
      # 设置为 false 时，当前矩阵中的其他任务不会因为单个任务失败而取消
      fail-fast: false
      # 限制同时运行的任务数量为1，即逐个运行
      # 防止有多个更新出现时git push冲突
      max-parallel: 1
      # 定义矩阵参数
      matrix:
        include:
          # - repo_dir: ariang
          #   repo_name: mayswind/AriaNg/releases/latest
            
          # 不加latest表示使用测试版本
          # - repo_dir: mindustry
          #   repo_name: Anuken/Mindustry/releases

          - repo_dir: ntpd-rs
            repo_name: pendulum-project/ntpd-rs/releases/latest

          # - repo_dir: openlist
          #   repo_name: OpenListTeam/OpenList/releases/latest

          # - repo_dir: qbittorrentee
          #   repo_name: c0re100/qBittorrent-Enhanced-Edition/releases/latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: 获取版本号并比较
        id: compare
        run: |
          # 获取最新版本号
          latest_tag=$(curl -s "https://api.github.com/repos/${{ matrix.repo_name }}?per_page=1" | jq  -r '[.. | .tag_name? | select(. !=null)] | .[0] // empty')

          if [ -z "$latest_tag" ]; then
             echo "获取${{ matrix.repo_dir }}最新版本号失败！"
          else
            echo "${{ matrix.repo_dir }}最新版本号: $latest_tag"
          fi

          # 获取本地版本号
          local_tag=$(grep -oP 'ARG APP_VERSION="\K[^"]+' ${{ matrix.repo_dir }}/Dockerfile || echo "")

          if [ -z "$local_tag" ]; then
            echo "获取${{ matrix.repo_dir }}本地版本号失败！"
          else
            echo "${{ matrix.repo_dir }}本地版本号: $local_tag"
          fi

          if [ -n "$latest_tag" ] && [ -n "$local_tag" ] && [ "$latest_tag" != "$local_tag" ]; then
            echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT
            echo "local_tag=$local_tag" >> $GITHUB_OUTPUT
            echo "${{ matrix.repo_dir }}有新版本：本地[$local_tag] --- 远程[$latest_tag]"
            echo "has_new_version=true" >> $GITHUB_OUTPUT
          else
            echo "${{ matrix.repo_dir }}没有新版本"
          fi

      - name: 验证release并获取commit id
        if: steps.compare.outputs.has_new_version == 'true'
        id: verify
        run: |
          # 从 repo_name 提取 owner/repo（去掉 /releases/latest 或 /releases 后缀）
          repo_full=$(echo "${{ matrix.repo_name }}" | sed 's|/releases/latest||;s|/releases||')

          # 使用 GitHub API 验证 release 并获取 tag 和 commit 信息
          curl -s "https://api.github.com/repos/$repo_full/releases/tags/${{ steps.compare.outputs.latest_tag }}" \
            > /tmp/release_verify.json

          verified_tag=$(jq -r '.tag_name // empty' /tmp/release_verify.json)
          commit_id=$(jq -r '.target_commitish // empty' /tmp/release_verify.json)

          if [ -z "$verified_tag" ] || [ -z "$commit_id" ]; then
            echo "Release验证失败！无法获取tag或commit信息，跳过更新"
            echo "need_update=false" >> $GITHUB_OUTPUT
            echo "commit_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$verified_tag" != "${{ steps.compare.outputs.latest_tag }}" ]; then
            echo "Tag验证失败: 期望 ${{ steps.compare.outputs.latest_tag }}, 实际 $verified_tag，跳过更新"
            echo "need_update=false" >> $GITHUB_OUTPUT
            echo "commit_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "need_update=true" >> $GITHUB_OUTPUT
          echo "commit_id=$commit_id" >> $GITHUB_OUTPUT
          echo "验证通过: tag=$verified_tag, commit=$commit_id"

      - name: 更新版本并提交
        if: steps.verify.outputs.need_update == 'true'
        run: |
          # 同步远程仓库
          git pull  
          echo "更新${{ matrix.repo_dir }}版本: ${{ steps.compare.outputs.local_tag }} → ${{ steps.compare.outputs.latest_tag }}"

          # 写入新tag到Dockerfile
          sed -i "s/^ARG APP_VERSION=\".*\"/ARG APP_VERSION=\"${{ steps.compare.outputs.latest_tag }}\"/" ${{ matrix.repo_dir }}/Dockerfile

          # 写入新commit id到Dockerfile
          sed -i "s/^ARG APP_COMMIT=\".*\"/ARG APP_COMMIT=\"${{ steps.verify.outputs.commit_id }}\"/" ${{ matrix.repo_dir }}/Dockerfile

          cat ${{ matrix.repo_dir }}/Dockerfile

          # 提交变更
          echo "提交版本更新"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ${{ matrix.repo_dir }}/Dockerfile

          # 构建更直观的 commit message
          commit_subject="chore(${{ matrix.repo_dir }}): update version"
          commit_body="${{ matrix.repo_dir }}: ${{ steps.compare.outputs.local_tag }} → ${{ steps.compare.outputs.latest_tag }} (commit: ${{ steps.verify.outputs.commit_id }})"

          # 使用格式化的提交消息
          git commit -m "$commit_subject" -m "$commit_body"
          git push
          echo "版本更新已提交"

      - name: 触发构建工作流
        if: steps.verify.outputs.need_update == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            console.log('准备触发自动构建工作流...');
            try {
              // 调用 GitHub API 触发 AutoBuild.yml 工作流
              const response = await github.rest.actions.createWorkflowDispatch({
                owner: '97xiami',
                repo: 'Dockerfiles',
                workflow_id: 'AutoBuild.yml',
                ref: 'main',
                inputs: {
                  repo: '${{ matrix.repo_dir }}',
                  ver: '${{ steps.compare.outputs.latest_tag }}',
                  commit: '${{ steps.verify.outputs.commit_id }}'
                }
              });
              console.log('工作流触发成功:', response.status);
            } catch (error) {
              core.setFailed(`工作流触发失败: ${error}`);
              console.error('错误详情:', error);
            }
